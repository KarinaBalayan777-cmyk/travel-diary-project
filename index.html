
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Производственная практика: Дневник путешествий</title>
    <style>
        :root { --primary: #0d9488; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: var(--primary); color: white; padding: 15px 20px; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; }
        .meta-info { display: flex; gap: 15px; margin-top: 10px; background: #f1f5f9; padding: 8px; border-radius: 4px; font-size: 14px; font-weight: 500; }
        .travel-img { width: 100%; max-height: 300px; object-fit: cover; border-radius: 6px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Дневник путешествий</h2>
            <div>Пользователь: <b id="user-display">Разработчик Карине</b></div>
        </div>

        <!-- Форма добавления путешествия -->
        <div class="card" style="margin-bottom: 25px;">
            <h3>Добавить новое воспоминание</h3>
            <div class="form-group">
                <label>Куда вы путешествовали (Локация):</label>
                <input type="text" id="travel-location" placeholder="Например: Рим, Италия">
            </div>
            <div class="form-group">
                <label>Ваши впечатления (Описание):</label>
                <textarea id="travel-desc" rows="3" placeholder="Опишите ваши приключения..."></textarea>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Стоимость поездки (руб):</label>
                    <input type="number" id="travel-cost" placeholder="50000">
                </div>
                <div class="form-group">
                    <label>Ссылка на изображение места:</label>
                    <input type="text" id="travel-img-url" placeholder="https://images.unsplash.com/...">
                </div>
            </div>
            <button class="btn" onclick="addTravel()">Сохранить поездку</button>
        </div>

        <!-- Переключатель ленты -->
        <div style="margin-bottom: 15px;">
            <button class="btn" style="background:#475569;" onclick="renderTravels('all')">Все путешествия</button>
            <button class="btn" style="background:#475569;" onclick="renderTravels('my')">Мой дневник</button>
        </div>

        <!-- Лента постов о путешествиях -->
        <div id="travels-feed" class="grid"></div>
    </div>

    <script>
        // Предустановленные данные для демонстрации "других пользователей"
        const defaultTravels = [
            {
                id: 1,
                author: "Александр_99",
                location: "Париж, Франция",
                desc: "Посетили Эйфелеву башню и Лувр. Архитектура потрясающая, но в городе очень много туристов.",
                cost: 120000,
                img: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?q=80&w=600&auto=format&fit=crop"
            },
            {
                id: 2,
                author: "Мария_Travel",
                location: "Озеро Байкал, Россия",
                desc: "Самый чистый лед в мире! Невероятная энергетика места. Обязательно к посещению зимой.",
                cost: 45000,
                img: "https://images.unsplash.com/photo-1551844931-cfcfecb3636f?q=80&w=600&auto=format&fit=crop"
            }
        ];

        if(!localStorage.getItem('travels')) {
            localStorage.setItem('travels', JSON.stringify(defaultTravels));
        }

        const username = "Карине Балаян";

        function addTravel() {
            const location = document.getElementById('travel-location').value.trim();
            const desc = document.getElementById('travel-desc').value.trim();
            const cost = document.getElementById('travel-cost').value;
            let img = document.getElementById('travel-img-url').value.trim();

            if(!location || !desc) return alert('Укажите локацию и описание!');
            
            // Если картинка не указана, ставим стандартную заглушку горы
            if(!img) img = "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=600&auto=format&fit=crop";

            const travels = JSON.parse(localStorage.getItem('travels'));
            travels.unshift({
                id: Date.now(),
                author: username,
                location,
                desc,
                cost: cost ? parseInt(cost) : 0,
                img
            });

            localStorage.setItem('travels', JSON.stringify(travels));
            
            // Очистка полей
            document.getElementById('travel-location').value = '';
            document.getElementById('travel-desc').value = '';
            document.getElementById('travel-cost').value = '';
            document.getElementById('travel-img-url').value = '';
            
            renderTravels('all');
        }

        function renderTravels(filter = 'all') {
            const feed = document.getElementById('travels-feed');
            const travels = JSON.parse(localStorage.getItem('travels'));
            feed.innerHTML = '';

            travels.forEach(item => {
                if(filter === 'my' && item.author !== username) return;

                feed.innerHTML += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #e2e8f0; padding-bottom:8px;">
                            <h3 style="margin:0; color:#0f172a;">📍 ${item.location}</h3>
                            <span style="font-size:13px; background:#e2e8f0; padding:3px 8px; border-radius:20px; font-weight:bold;">Автор: ${item.author}</span>
                        </div>
                        <img class="travel-img" src="${item.img}" alt="travel image">
                        <p style="margin:15px 0; line-height:1.6;">${item.desc}</p>
                        <div class="meta-info">
                            <div>💰 Бюджет: <b>${item.cost ? item.cost + ' руб.' : 'Не указан'}</b></div>
                            <div>🗺️ Геопривязка: <span style="color:#0d9488;">Подтверждена API</span></div>
                        </div>
                    </div>
                `;
            });
        }

        // Запуск системы
        renderTravels('all');
    </script>
</body>
</html>
